name: Generate Map Wallpaper

on:
  workflow_dispatch:
    inputs:
      location:
        description: 'Adresse (z.B. Sitterdorf, Switzerland)'
        required: true
        type: string
      theme:
        description: 'Karten-Theme'
        required: false
        default: 'midnight_blue'
        type: choice
        options:
          - midnight_blue
          - noir
          - blueprint
          - neon_cyberpunk
          - warm_beige
          - pastel_dream
          - japanese_ink
          - emerald
          - forest
          - ocean
          - terracotta
          - sunset
          - autumn
          - copper_patina
          - gradient_roads
          - contrast_zones
      distance:
        description: 'Kartenradius in Metern'
        required: false
        default: '3000'
        type: string
      width_px:
        description: 'Bildbreite in Pixel (iPhone 13: 1170)'
        required: false
        default: '1170'
        type: string
      height_px:
        description: 'Bildhöhe in Pixel (iPhone 13: 2532)'
        required: false
        default: '2532'
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: terraink_py installieren
        run: pip install terraink_py

      - name: Wallpaper generieren
        run: |
          python generate.py \
            --location "${{ github.event.inputs.location }}" \
            --theme "${{ github.event.inputs.theme || 'midnight_blue' }}" \
            --distance "${{ github.event.inputs.distance || '3000' }}" \
            --width-px "${{ github.event.inputs.width_px || '1170' }}" \
            --height-px "${{ github.event.inputs.height_px || '2532' }}"

      - name: Bild in Repo committen
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "actions@github.com"
          mkdir -p wallpaper
          cp output/wallpaper.png wallpaper/current.png
          git add wallpaper/current.png
          git diff --staged --quiet || git commit -m "🗺️ ${{ github.event.inputs.location }} — ${{ github.event.inputs.theme }}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Temporäre Dateien löschen
        run: rm -rf output/

      - name: Alte Workflow-Runs löschen
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 5
