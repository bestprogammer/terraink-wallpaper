name: Generate Map Wallpaper

on:
  workflow_dispatch:
    inputs:
      location:
        description: 'Adresse (z.B. Sitterdorf, Switzerland)'
        required: true
        type: string
      theme:
        description: 'Karten-Theme'
        required: false
        default: 'midnight_blue'
        type: choice
        options:
          - midnight_blue
          - noir
          - blueprint
          - neon_cyberpunk
          - warm_beige
          - pastel_dream
          - japanese_ink
          - emerald
          - forest
          - ocean
          - terracotta
          - sunset
          - autumn
          - copper_patina
          - gradient_roads
          - contrast_zones
      distance:
        description: 'Kartenradius in Metern'
        required: false
        default: '3000'
        type: string
      screen_width:
        description: 'Bildschirmbreite in Punkten'
        required: false
        default: '390'
        type: string
      screen_height:
        description: 'Bildschirmhöhe in Punkten'
        required: false
        default: '844'
        type: string
      scale:
        description: 'Scale Factor (2 oder 3)'
        required: false
        default: '3'
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: terraink_py installieren
        run: pip install terraink_py

      - name: Wallpaper generieren
        run: |
          python generate.py \
            --location "${{ github.event.inputs.location }}" \
            --theme "${{ github.event.inputs.theme || 'midnight_blue' }}" \
            --distance "${{ github.event.inputs.distance || '3000' }}" \
            --screen-width "${{ github.event.inputs.screen_width || '390' }}" \
            --screen-height "${{ github.event.inputs.screen_height || '844' }}" \
            --scale "${{ github.event.inputs.scale || '3' }}"

      - name: Bild in Repo committen
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "actions@github.com"
          mkdir -p wallpaper
          cp output/wallpaper.png wallpaper/current.png
          git add wallpaper/current.png
          git diff --staged --quiet || git commit -m "🗺️ ${{ github.event.inputs.location }} — ${{ github.event.inputs.theme }}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Temporäre Dateien löschen
        run: rm -rf output/

      - name: Alte Workflow-Runs löschen
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 5
